  <text x="211" y="144" font-family="'Courier New', monospace" font-size="13" class="prompt-txt"> keyboard-driven postgresql browser</text>

  <text x="196" y="163" font-family="'Courier New', monospace" font-size="13" class="prompt-sym">$</text>
  <text x="211" y="163" font-family="'Courier New', monospace" font-size="13" class="prompt-txt"> pgview -url </text>
  <text x="316" y="163" font-family="'Courier New', monospace" font-size="13" fill="#74b9ff">prod.db:5432</text>
