  <text x="212" y="196" font-family="'Courier New', monospace" font-size="11" class="row-hi"> orders</text>
  <text x="328" y="196" font-family="'Courier New', monospace" font-size="11" class="prompt-txt">BASE TABLE</text>
  <text x="212" y="212" font-family="'Courier New', monospace" font-size="11" fill="#253545"> customers</text>
  <text x="328" y="212" font-family="'Courier New', monospace" font-size="11" fill="#1e2e3e">BASE TABLE</text>
  <text x="212" y="228" font-family="'Courier New', monospace" font-size="11" fill="#1a2535"> products</text>
  <text x="328" y="228" font-family="'Courier New', monospace" font-size="11" fill="#192535">BASE TABLE</text>

