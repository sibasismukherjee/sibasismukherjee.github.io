name: Update pgview Docs

on:
  repository_dispatch:
    types: [pgview-docs-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'pgview version (e.g. 0.5.0)'
        required: true

jobs:
  update:
    name: Regenerate feature grid, patch version, sync demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Updating to v${VERSION}"

      - name: Fetch pgview-features.yml from pgview repo
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/sibasismukherjee/pgview/main/.github/pgview-features.yml" \
            -o pgview-features.yml
          echo "Fetched $(wc -l < pgview-features.yml) lines from pgview-features.yml"

      - name: Regenerate feature grid and patch version badge
        run: |
          python3 .github/scripts/update_feature_grid.py \
            pgview-features.yml \
            pgview.html \
            "${{ steps.ver.outputs.version }}"

      - name: Patch version in try-pgview.html
        run: |
          if [ -f try-pgview.html ]; then
            sed -i "s|pgview v[0-9]*\.[0-9]*\.[0-9]*|pgview v${{ steps.ver.outputs.version }}|g" try-pgview.html
            echo "Patched try-pgview.html"
          fi

      - name: Sync demo GIF from pgview repo
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/sibasismukherjee/pgview/main/assets/demo.gif" \
            -o img/pgview-demo.gif
          echo "Demo GIF synced ($(wc -c < img/pgview-demo.gif) bytes)"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pgview.html try-pgview.html img/pgview-demo.gif
          if git diff --cached --quiet; then
            echo "No changes — already up to date"
          else
            git commit -m "docs(pgview): sync v${{ steps.ver.outputs.version }} — feature grid + demo GIF"
            git push
          fi
